<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questionário</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            width: 50%;
            margin: 50px auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        label {
            font-weight: bold;
        }
        .form-group {
            margin-bottom: 15px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Questionário</h1>
    <form action="#" method="post">
        <div class="form-group">
            <label for="nome"><b>Nome:</b></label>
            <input type="text" id="nome" name="nome" required>
        </div>

        <div class="form-group">
            <label for="idade"><b>Idade:</b></label>
            <input type="number" id="idade" name="idade" required>
        </div>

        <div class="form-group">
            <label for="sexo"><b>Sexo:</b></label>
            <select id="sexo" name="sexo" required>
                <option value="masculino">Masculino</option>
                <option value="feminino">Feminino</option>
                <option value="outro">Outro</option>
            </select>
        </div>

        <div class="form-group">
            <label for="lugar"><b>Lugar onde mora:</b></label>
            <input type="text" id="lugar" name="lugar" required>
        </div>

        <div class="form-group">
            <label for="trabalho"><b>Como foi o seu 2024:</b></label>
            <input type="text" id="trabalho" name="trabalho" required>
        </div>

        <div class="form-group">
            <label for="meta"><b>Qual sua meta para 2025?</b></label>
            <textarea id="meta" name="meta" rows="4" required></textarea>
        </div>

        <button type="submit">Enviar</button>
    </form>
</div>

</body>
</html>
